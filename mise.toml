[tools]
java = "temurin-25"
maven = "4.0.0-rc-5"
mvnd = "2.0.0-rc-3"
shellcheck = "latest"

[tasks.default]
description = "Build and run all tests (incremental)"
run = "mvnd -q verify"
sources = [
    "**/pom.xml",
    "**/src/main/java/**",
    "**/src/test/java/**",
    "**/src/test/resources/**",
    "**/src/it/java/**",
    "**/src/it/resources/**",
]
outputs = [
    "**/target/classes/**",
    "**/target/test-classes/**",
    "**/target/generated-sources/**",
    "**/target/generated-test-sources/**",
]

[tasks."build:format"]
description = "Format code"
run = "mvnd -q spotless:apply license:format"

[tasks."lint:sh"]
description = "Lint shell scripts with shellcheck"
run = """
shellcheck -x --source-path=SCRIPTDIR benchmarks/scripts/**/*.sh benchmarks/scripts/*.sh
shellcheck roadrunner-app/src/main/resources/bin/roadrunner
"""

[tasks.benchmarks]
description = "Run JMH benchmarks (quick run without metadata)"
depends = ["default"]
run = "java -jar roadrunner-microbenchmarks/target/benchmarks.jar"

[tasks."benchmark:run"]
description = "Run benchmarks and collect results with metadata"
depends = ["default"]
run = "./benchmarks/scripts/collect-benchmark.sh"

[tasks."benchmark:check"]
description = "Run benchmarks and check for regressions against baseline"
depends = ["benchmark:run"]
run = "./benchmarks/scripts/detect-regressions.sh --latest"

[tasks."benchmark:compare"]
description = "Compare two specific benchmark runs"
run = "./benchmarks/scripts/detect-regressions.sh --compare $@"

[tasks."benchmark:baseline:update"]
description = "Update baseline from most recent benchmark result"
run = "./benchmarks/scripts/update-baseline.sh"

[tasks."benchmark:baseline:set"]
description = "Set baseline from specific result file"
run = "./benchmarks/scripts/update-baseline.sh $@"

[tasks."benchmark:chart"]
description = "Generate trend charts for all benchmarks"
run = "./benchmarks/scripts/generate-charts.sh"

[tasks."benchmark:chart:single"]
description = "Generate chart for specific benchmark (pass benchmark name)"
run = "./benchmarks/scripts/generate-charts.sh --benchmark $@"

[tasks."benchmark:report"]
description = "Full report: run benchmark, check regressions, generate charts"
depends = ["benchmark:run"]
run = """
./benchmarks/scripts/detect-regressions.sh --latest || true
./benchmarks/scripts/generate-charts.sh
"""

[tasks."release:patch"]
description = "Release next patch version (e.g. 1.0.2-SNAPSHOT → 1.0.2, next 1.0.3-SNAPSHOT)"
run = """
CURRENT=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --raw-streams)
BASE="${CURRENT%-SNAPSHOT}"
MAJOR=$(echo "$BASE" | cut -d. -f1)
MINOR=$(echo "$BASE" | cut -d. -f2)
PATCH=$(echo "$BASE" | cut -d. -f3)
./mvnw -B release:prepare release:perform \
  -DreleaseVersion="${BASE}" \
  -DdevelopmentVersion="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT" \
  -DskipTests -Dmaven.javadoc.skip=true -Denforcer.skip=true
"""

[tasks."release:minor"]
description = "Release next minor version (e.g. 1.0.x-SNAPSHOT → 1.1.0, next 1.1.1-SNAPSHOT)"
run = """
CURRENT=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --raw-streams)
BASE="${CURRENT%-SNAPSHOT}"
MAJOR=$(echo "$BASE" | cut -d. -f1)
MINOR=$(echo "$BASE" | cut -d. -f2)
./mvnw -B release:prepare release:perform \
  -DreleaseVersion="${MAJOR}.$((MINOR + 1)).0" \
  -DdevelopmentVersion="${MAJOR}.$((MINOR + 1)).1-SNAPSHOT" \
  -DskipTests -Dmaven.javadoc.skip=true -Denforcer.skip=true
"""

[tasks."release:major"]
description = "Release next major version (e.g. 1.x.x-SNAPSHOT → 2.0.0, next 2.0.1-SNAPSHOT)"
run = """
CURRENT=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --raw-streams)
BASE="${CURRENT%-SNAPSHOT}"
MAJOR=$(echo "$BASE" | cut -d. -f1)
./mvnw -B release:prepare release:perform \
  -DreleaseVersion="$((MAJOR + 1)).0.0" \
  -DdevelopmentVersion="$((MAJOR + 1)).0.1-SNAPSHOT" \
  -DskipTests -Dmaven.javadoc.skip=true -Denforcer.skip=true
"""
