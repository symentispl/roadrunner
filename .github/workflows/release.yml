name: Maven Release

on:
  workflow_dispatch:
    inputs:
      version-major:
        description: 'Bump major version (e.g. 1.x.x → 2.0.0)'
        required: false
        default: 'false'
      version-minor:
        description: 'Bump minor version (e.g. 1.0.x → 1.1.0)'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Configure git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Calculate versions
        id: versions
        run: |
          CURRENT_VERSION=$(./mvnw -q -Dexpression=project.version -DforceStdout help:evaluate)
          BASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          IFS='.' read -r -a parts <<< "$BASE_VERSION"
          MAJOR=${parts[0]}
          MINOR=${parts[1]}
          PATCH=${parts[2]}
          RELEASE_VERSION="$MAJOR.$MINOR.$PATCH"
          if [ "${{ github.event.inputs.version-major }}" = "true" ]; then
            NEXT_MAJOR=$((MAJOR + 1))
            NEXT_DEV_VERSION="${NEXT_MAJOR}.0.0-SNAPSHOT"
          elif [ "${{ github.event.inputs.version-minor }}" = "true" ]; then
            NEXT_MINOR=$((MINOR + 1))
            NEXT_DEV_VERSION="${MAJOR}.${NEXT_MINOR}.0-SNAPSHOT"
          else
            NEXT_PATCH=$((PATCH + 1))
            NEXT_DEV_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          fi
          echo "release-version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "next-dev-version=${NEXT_DEV_VERSION}" >> $GITHUB_OUTPUT

      - name: Release with Maven Wrapper
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Top-level flags apply to release:prepare; -Darguments passes the same flags to the
          # forked Maven process spawned by release:perform for the actual build and deploy.
          ./mvnw -B release:prepare release:perform \
            -DreleaseVersion=${{ steps.versions.outputs.release-version }} \
            -DdevelopmentVersion=${{ steps.versions.outputs.next-dev-version }} \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Darguments="-DskipTests -Dmaven.javadoc.skip=true"
