name: Maven Release

on:
  workflow_dispatch:
    inputs:
      version-major:
        description: 'Bump major version (e.g. 1.x.x → 2.0.0)'
        required: false
        default: 'false'
      version-minor:
        description: 'Bump minor version (e.g. 1.0.x → 1.1.0)'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Release
        uses: qcastel/github-actions-maven-release@master
        with:
          release-branch-name: "master"
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          git-release-bot-name: "release-bot"
          git-release-bot-email: "release-bot@users.noreply.github.com"
          maven-args: "-DskipTests -Dmaven.javadoc.skip=true -Denforcer.skip=true"
          maven-servers: '[{"id":"github","username":"${{ github.actor }}","password":"${{ secrets.GITHUB_TOKEN }}"}]'
          version-major: ${{ github.event.inputs.version-major }}
          version-minor: ${{ github.event.inputs.version-minor }}
